name: auto-update

# КАРКАС (Фаза 5-B): плановый полный инкрементальный прогон — тянет изменённые юниты
# с Google Drive, декомпилирует, обновляет манифесты/ассеты/код на HF, пересобирает
# дескрипторы и пушит изменения. ПК не нужен — выполняется в облаке по расписанию.
#
# ВНИМАНИЕ — не протестировано в облаке, перед боевым использованием проверьте вручную
# (workflow_dispatch) и учтите ОГРАНИЧЕНИЯ:
#   * Диск GitHub-раннера ~14 ГБ: юнит крупнее (redux_base ~12 ГБ) может НЕ влезть даже
#     с --lean. Для таких юнитов используйте self-hosted runner на своём VPS.
#   * Лимит задания 6 ч: инкрементальный прогон без изменений — минуты; крупное изменение
#     может не уложиться.
#   * gdown (публичный GDrive) иногда требует confirm-cookie headless; access:shared юниты
#     идут через rclone (нужен RCLONE_CONF секрет с OAuth refresh-token).
#
# СЕКРЕТЫ (Settings -> Secrets and variables -> Actions):
#   REPO_PAT    — Personal Access Token (scope: repo) для checkout приватного декомпилятора
#                 и push. Если оба репозитория и push под одним аккаунтом — один PAT.
#   HF_TOKEN    — write-токен Hugging Face (заливка ассетов/кода/индекса).
#   RCLONE_CONF — содержимое rclone.conf с remote 'gdrive' (для access:shared юнитов).

on:
  # Расписание ВЫКЛЮЧЕНО до настройки секретов (иначе ночные падения). После того как
  # заданы REPO_PAT/HF_TOKEN/RCLONE_CONF и ручной прогон прошёл — раскомментируйте:
  # schedule:
  #   - cron: '0 3 * * *'      # ежедневно 03:00 UTC
  workflow_dispatch:
    inputs:
      only:
        description: 'Только юнит (name); пусто = все включённые'
        required: false
      force:
        description: 'Игнорировать lock (true/false)'
        required: false
        default: 'false'
      notify_test:
        description: 'Тест Telegram-уведомления (true) — отправить тестовое сообщение'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest        # innounp.exe (Inno Setup 6.4) — Windows
    timeout-minutes: 350
    env:
      RCLONE_CONFIG: ${{ github.workspace }}\rclone.conf   # rclone берёт конфиг отсюда
    steps:
      - name: Enable git long paths (Windows)
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout aggregator
        uses: actions/checkout@v4
        with:
          path: sr-mods-aggregator
          token: ${{ secrets.REPO_PAT }}

      - name: Checkout decompiler (sibling ../rson_decompiler)
        uses: actions/checkout@v4
        with:
          repository: ArtYudin89/rson-decompiler
          path: rson_decompiler
          token: ${{ secrets.REPO_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install deps
        run: pip install gdown requests huggingface_hub

      - name: Setup rclone + config
        shell: pwsh
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          choco install rclone -y --no-progress
          if (-not $env:RCLONE_CONF) { Write-Host 'RCLONE_CONF секрет не задан — access:shared юниты будут пропущены'; exit 0 }
          $conf = $env:RCLONE_CONF
          if ($conf.Length -gt 0 -and [int][char]$conf[0] -eq 0xFEFF) { $conf = $conf.Substring(1) }
          [IO.File]::WriteAllText("$env:GITHUB_WORKSPACE\rclone.conf", $conf, (New-Object System.Text.UTF8Encoding($false)))
          $rc = "C:\ProgramData\chocolatey\bin\rclone.exe"
          if (Test-Path $rc) { & $rc --config "$env:GITHUB_WORKSPACE\rclone.conf" listremotes } else { Write-Host 'rclone shim ещё не в PATH — следующий шаг найдёт через which' }

      - name: Git identity
        working-directory: sr-mods-aggregator
        shell: bash
        run: |
          git config user.name  "sr-mods-bot"
          git config user.email "bot@users.noreply.github.com"

      # 1) ДЕТЕКЦИЯ + декомпиляция изменённых юнитов (это и есть проверка автообновления:
      #    skip-if-unchanged по remote_sig из GDrive; --commit коммитит изменения).
      - name: Detect & decompile changed units
        working-directory: sr-mods-aggregator
        shell: bash
        run: |
          ONLY='${{ github.event.inputs.only }}'
          FORCE='${{ github.event.inputs.force }}'
          ARGS="--commit --lean --cloud"
          [ -n "$ONLY" ] && ARGS="$ARGS --only $ONLY"
          [ "$FORCE" = "true" ] && ARGS="$ARGS --force"
          python pipeline/aggregate.py $ARGS

      # 2) Закрепить доказательство СРАЗУ (push коммитов детекции), даже если ниже упадёт.
      - name: Push detected changes
        working-directory: sr-mods-aggregator
        shell: bash
        run: |
          for i in 1 2 3; do
            git push && break || {
              echo "push retry $i (fetch+rebase)";
              git fetch origin master && git rebase origin/master || git rebase --abort;
            }
          done

      # 2b) Уведомить в Telegram, если тяжёлый manual-юнит (redux_base) изменился на GDrive.
      - name: Notify heavy unit changed (Telegram)
        if: ${{ always() }}
        working-directory: sr-mods-aggregator
        shell: bash
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          NOTIFY_TEST: ${{ github.event.inputs.notify_test }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "TG_BOT_TOKEN/TG_CHAT_ID не заданы — уведомление пропущено"; exit 0; fi
          PENDING=$(python -c "import json;d=json.load(open('state/manual_pending.json'));print(', '.join(m['name'] for m in d.get('pending',[])))" 2>/dev/null || echo "")
          if [ "$NOTIFY_TEST" = "true" ]; then PENDING="ТЕСТ (redux_base_installer)"; fi
          if [ -z "$PENDING" ]; then echo "Тяжёлых юнитов к обновлению нет — не шлём."; exit 0; fi
          MSG=$'\xF0\x9F\x9B\xB0 SR Mods: тяжёлый юнит обновился на GDrive и требует ЛОКАЛЬНОГО прогона:\n'"$PENDING"$'\n\nЗапусти update_base.bat в репозитории и дождись завершения.'
          RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" --data-urlencode text="$MSG")
          echo "Ответ Telegram API: $RESP"
          echo "$RESP" | python -c "import sys,json; sys.exit(0 if json.load(sys.stdin).get('ok') else 1)" \
            && echo "Telegram доставлено ($PENDING)" \
            || { echo 'Telegram НЕ доставлено — см. ответ выше (частая причина: не нажат Start у бота)'; exit 1; }

      # 3) Ассеты изменённых юнитов на HF (тяжёлый шаг; не валит весь прогон).
      - name: Assets to HF
        continue-on-error: true
        working-directory: sr-mods-aggregator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: '1'
        shell: bash
        run: python pipeline/aggregate.py --assets --fetch --lean

      # 4) Код изменённых юнитов на HF.
      - name: Code to HF
        continue-on-error: true
        working-directory: sr-mods-aggregator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: '1'
        shell: bash
        run: python pipeline/aggregate.py --code-track

      # 5) Дескрипторы + публикация индекса.
      - name: Descriptors + index
        continue-on-error: true
        working-directory: sr-mods-aggregator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: '1'
        shell: bash
        run: |
          python pipeline/aggregate.py --descriptors
          python pipeline/aggregate.py --publish-index

      # 6) Финальный коммит/пуш всего (дескрипторы, индекс, lock) — всегда.
      - name: Commit & push all
        if: ${{ always() }}
        working-directory: sr-mods-aggregator
        shell: bash
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Изменений для коммита нет."
          else
            git commit -m "auto-update: $(date -u +%Y-%m-%d) (изменённые юниты + дескрипторы)"
            for i in 1 2 3; do
              git push && break || {
                echo "push retry $i (fetch+rebase)";
                git fetch origin master && git rebase origin/master || git rebase --abort;
              }
            done
          fi
